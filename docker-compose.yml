services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: smart-geyser-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/workspace/target
    environment:
      CARGO_TERM_COLOR: always
    command: bash

  ha-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.ha-test
    image: smart-geyser-ha-test
    working_dir: /workspace/ha-integration
    volumes:
      - .:/workspace

  prod:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    image: smart-geyser-service
    ports:
      - "8080:8080"

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
